<h2 class="sr-only">AI-Agile plugin repository structure explorer</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
body{font-family:var(--font-sans);padding:1.5rem 1rem 2rem;display:flex;gap:20px;align-items:flex-start}
.tree-col{width:300px;flex-shrink:0}
.detail-col{flex:1;min-width:0}

/* Header */
.tag{display:inline-block;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary);border-radius:20px;padding:3px 10px;margin-bottom:1rem}
.col-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-tertiary);margin-bottom:.75rem}

/* Tree */
.tree{font-size:13px;font-family:var(--font-mono,monospace)}
.tree-item{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:5px;cursor:pointer;color:var(--color-text-secondary);transition:background .12s;user-select:none;white-space:nowrap}
.tree-item:hover{background:var(--color-background-secondary)}
.tree-item.active{background:var(--color-background-secondary);color:var(--color-text-primary)}
.tree-item.folder{color:var(--color-text-primary);font-weight:500}
.tree-item i{font-size:14px;flex-shrink:0;color:var(--color-text-tertiary)}
.tree-item.folder i.ti-chevron-right{transition:transform .15s}
.tree-item.folder.open i.ti-chevron-right{transform:rotate(90deg)}
.tree-item.active i{color:var(--color-text-secondary)}
.children{display:none;padding-left:16px}
.children.open{display:block}

/* Special file badges */
.badge{font-size:10px;font-weight:500;padding:1px 6px;border-radius:10px;margin-left:auto;flex-shrink:0}
.badge-star{background:var(--color-background-warning);color:var(--color-text-warning)}
.badge-core{background:var(--color-background-info);color:var(--color-text-info)}
.badge-new{background:var(--color-background-success);color:var(--color-text-success)}

/* Detail panel */
.detail-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.1rem 1.25rem;min-height:200px}
.detail-empty{display:flex;align-items:center;justify-content:center;height:200px;color:var(--color-text-tertiary);font-size:13px}
.detail-path{font-size:11px;font-family:var(--font-mono,monospace);color:var(--color-text-tertiary);margin-bottom:.75rem}
.detail-title{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:.25rem}
.detail-role{font-size:12px;color:var(--color-text-secondary);margin-bottom:1rem;font-style:italic}
.detail-divider{height:0.5px;background:var(--color-border-tertiary);margin:.75rem 0}
.detail-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-tertiary);margin-bottom:.4rem}
.detail-desc{font-size:13px;color:var(--color-text-secondary);line-height:1.65;margin-bottom:.75rem}
.chip{display:inline-block;font-size:11px;padding:2px 8px;border-radius:12px;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);margin:2px 2px 2px 0}
.chips{margin-bottom:.75rem}

@media(max-width:540px){body{flex-direction:column}.tree-col{width:100%}}
</style>

<div class="tree-col">
  <div class="tag">GitHub Template</div>
  <div class="col-label">File tree</div>
  <div class="tree" id="tree"></div>
</div>

<div class="detail-col">
  <div class="col-label">File details</div>
  <div class="detail-card" id="detail">
    <div class="detail-empty">← Select a file to see details</div>
  </div>
</div>

<script>
const FILES = [
  {id:'root',name:'ai-agile-plugin/',type:'folder',path:'/',desc:'GitHub Template repository root. Users click "Use this template" to scaffold into any project.',role:'Repository root',inputs:[],outputs:['Scaffolded project'],note:'Mark as Template in GitHub repo settings.'},
  {id:'github',name:'.github/',type:'folder',path:'/.github/',desc:'GitHub metadata: issue templates and (optionally) funding config.',role:'GitHub config',parent:'root'},
  {id:'issue-tmpl',name:'ISSUE_TEMPLATE/',type:'folder',path:'/.github/ISSUE_TEMPLATE/',parent:'github'},
  {id:'bug',name:'bug_report.md',type:'file',path:'/.github/ISSUE_TEMPLATE/bug_report.md',desc:'Standard bug report template. Prompts reporters to name the phase, subagent, and challenge severity so issues are actionable.',role:'Issue template',parent:'issue-tmpl',badge:'new',badgeLabel:'new'},
  {id:'claude',name:'.claude/',type:'folder',path:'/.claude/',desc:'Claude Code reads this directory automatically. All slash commands live here.',role:'Claude Code command root',parent:'root'},
  {id:'commands',name:'commands/',type:'folder',path:'/.claude/commands/',parent:'claude'},
  {id:'agile-start',name:'agile-start.md',type:'file',path:'/.claude/commands/agile-start.md',desc:'Master Orchestrator. Entry point for the whole system. Renders the phase table and routes to /vision.',role:'Master Orchestrator',badge:'core',badgeLabel:'core',parent:'commands'},
  {id:'p1',name:'phase1/',type:'folder',path:'/.claude/commands/phase1/',parent:'commands'},
  {id:'vision',name:'vision.md',type:'file',path:'/.claude/commands/phase1/vision.md',desc:'Phase 1 Orchestrator. Dispatches intake → brief → challenge → improve in strict sequence. Gates on stakeholder sign-off.',role:'Phase 1 Orchestrator',parent:'p1'},
  {id:'vision-intake',name:'vision-intake.md',type:'file',path:'/.claude/commands/phase1/vision-intake.md',desc:'Subagent A. Captures and validates raw user input. Surfaces all ambiguities before any brief is written. No creative content.',role:'Subagent A — Input Capture',parent:'p1'},
  {id:'vision-brief',name:'vision-brief.md',type:'file',path:'/.claude/commands/phase1/vision-brief.md',desc:'Subagent B. Generates Executive Product Brief from validated intake only. Five required sections. Emits Handoff Schema.',role:'Subagent B — Brief Generator',parent:'p1'},
  {id:'vision-challenge',name:'vision-challenge.md',type:'file',path:'/.claude/commands/phase1/vision-challenge.md',desc:'Subagent C ★ — The Adversarial Challenger. Finds the single most dangerous assumption. Does not fix. Does not improve. CRITICAL = halt.',role:'Subagent C ★ — Challenger',badge:'star',badgeLabel:'★',parent:'p1'},
  {id:'vision-improve',name:'vision-improve.md',type:'file',path:'/.claude/commands/phase1/vision-improve.md',desc:'Subagent D. Audits schema against Four Laws. Runs max 2 compression iterations. Halts if status is still Challenged.',role:'Subagent D — Self-Improve',parent:'p1'},
  {id:'p2',name:'phase2/',type:'folder',path:'/.claude/commands/phase2/',parent:'commands'},
  {id:'architect',name:'architect.md',type:'file',path:'/.claude/commands/phase2/architect.md',desc:'Phase 2 Orchestrator. Requires Phase 1 Approved. Routes epics → stories → challenge → improve. Gates on architect review.',role:'Phase 2 Orchestrator',parent:'p2'},
  {id:'arch-epics',name:'arch-epics.md',type:'file',path:'/.claude/commands/phase2/arch-epics.md',desc:'Subagent A. Generates Epics, Features, and Architectural Guardrails from value proposition. No stories, no tasks.',role:'Subagent A — Epics',parent:'p2'},
  {id:'arch-stories',name:'arch-stories.md',type:'file',path:'/.claude/commands/phase2/arch-stories.md',desc:'Subagent B. Writes User Stories, Engineering Tasks, and Given/When/Then Acceptance Criteria. Receives epics array only.',role:'Subagent B — Stories',parent:'p2'},
  {id:'arch-challenge',name:'arch-challenge.md',type:'file',path:'/.claude/commands/phase2/arch-challenge.md',desc:'Subagent C ★ — Technical Adversarial Challenger. Finds the assumption that would cause mid-sprint rework. Does not rewrite.',role:'Subagent C ★ — Challenger',badge:'star',badgeLabel:'★',parent:'p2'},
  {id:'arch-improve',name:'arch-improve.md',type:'file',path:'/.claude/commands/phase2/arch-improve.md',desc:'Subagent D. Technical integrity audit. Flags speculative Epics, compound criteria, missing DoR statuses. 2 iterations max.',role:'Subagent D — Self-Improve',parent:'p2'},
  {id:'p3',name:'phase3/',type:'folder',path:'/.claude/commands/phase3/',parent:'commands'},
  {id:'sprint',name:'sprint.md',type:'file',path:'/.claude/commands/phase3/sprint.md',desc:'Phase 3 Orchestrator. Requires Phase 2 Approved. Routes plan → DoR → challenge → improve. Emits Sprint Readiness Package.',role:'Phase 3 Orchestrator',parent:'p3'},
  {id:'sprint-plan',name:'sprint-plan.md',type:'file',path:'/.claude/commands/phase3/sprint-plan.md',desc:'Subagent A. Defines Sprint Goal options (max 3) and priority-ordered backlog. States Sprint 1 success before any output.',role:'Subagent A — Sprint Plan',parent:'p3'},
  {id:'sprint-dor',name:'sprint-dor.md',type:'file',path:'/.claude/commands/phase3/sprint-dor.md',desc:'Subagent B. Audits every story against Definition of Ready. Defines Kanban columns with entry/exit criteria and WIP limits.',role:'Subagent B — DoR Audit',parent:'p3'},
  {id:'sprint-challenge',name:'sprint-challenge.md',type:'file',path:'/.claude/commands/phase3/sprint-challenge.md',desc:'Subagent C ★ — Sprint Adversarial Challenger. Asks what would cause the sprint to fail in a way the team won\'t detect until too late.',role:'Subagent C ★ — Challenger',badge:'star',badgeLabel:'★',parent:'p3'},
  {id:'sprint-improve',name:'sprint-improve.md',type:'file',path:'/.claude/commands/phase3/sprint-improve.md',desc:'Subagent D. Sprint readiness audit. Output must be directly pasteable into Jira / Azure DevOps / Linear with zero extra work.',role:'Subagent D — Self-Improve',parent:'p3'},
  {id:'p4',name:'phase4/',type:'folder',path:'/.claude/commands/phase4/',parent:'commands'},
  {id:'retro',name:'retro.md',type:'file',path:'/.claude/commands/phase4/retro.md',desc:'Retro Orchestrator. Runs after each sprint. Routes analyze → prescribe → challenge → patch audit. No file modified without human approval.',role:'Phase 4 Orchestrator',parent:'p4'},
  {id:'retro-analyze',name:'retro-analyze.md',type:'file',path:'/.claude/commands/phase4/retro-analyze.md',desc:'Subagent A. Evidence-based pattern detector. No pattern claimed without 2+ log entries. Identifies which phases generated most CRITICAL challenges.',role:'Subagent A — Pattern Analysis',parent:'p4'},
  {id:'retro-prescribe',name:'retro-prescribe.md',type:'file',path:'/.claude/commands/phase4/retro-prescribe.md',desc:'Subagent B. Writes surgical constitution patches. One patch per pattern. Max 3 lines. ADD, MODIFY, or STRENGTHEN only — no rewrites.',role:'Subagent B — Patch Generator',parent:'p4'},
  {id:'retro-challenge',name:'retro-challenge.md',type:'file',path:'/.claude/commands/phase4/retro-challenge.md',desc:'Subagent C ★ — Patch Challenger. The adversary applied to the patches themselves. Finds the patch most likely to make the system worse.',role:'Subagent C ★ — Challenger',badge:'star',badgeLabel:'★',parent:'p4'},
  {id:'retro-improve',name:'retro-improve.md',type:'file',path:'/.claude/commands/phase4/retro-improve.md',desc:'Subagent D. Patch audit. Approves or flags each patch. Merges patches targeting the same root cause. Moves flagged patches to a holding log.',role:'Subagent D — Patch Audit',parent:'p4'},
  {id:'docs',name:'docs/',type:'folder',path:'/docs/',desc:'GitHub Pages source. The eli8 cover page is the public-facing landing page for the plugin.',parent:'root'},
  {id:'index',name:'index.html',type:'file',path:'/docs/index.html',desc:'The eli8 plain-language cover page. Explains the plugin to new users in plain language. Published via GitHub Pages.',role:'Public landing page',badge:'new',badgeLabel:'new',parent:'docs'},
  {id:'claude-md',name:'CLAUDE.md',type:'file',path:'/CLAUDE.md',desc:'The Agent Constitution. Contains the Four Laws and the Adversarial Principle. These are immutable — never patched by retro-prescribe. Lives at the project root so Claude Code picks it up automatically.',role:'Agent Constitution — immutable core',badge:'core',badgeLabel:'core',parent:'root'},
  {id:'readme',name:'README.md',type:'file',path:'/README.md',desc:'Setup instructions, quick start guide, and phase overview. Links to the docs/ cover page. Includes the "Use this template" call to action.',role:'Setup + quick start',badge:'new',badgeLabel:'new',parent:'root'},
  {id:'changelog',name:'CHANGELOG.md',type:'file',path:'/CHANGELOG.md',desc:'Version history following Keep a Changelog format. v3 is the current release. Tracks constitution patches applied across retro cycles.',role:'Version history',badge:'new',badgeLabel:'new',parent:'root'},
  {id:'license',name:'LICENSE',type:'file',path:'/LICENSE',desc:'MIT License. Permissive — teams can fork, adapt, and redistribute the plugin without restriction.',role:'MIT License',badge:'new',badgeLabel:'new',parent:'root'},
  {id:'gitignore',name:'.gitignore',type:'file',path:'/.gitignore',desc:'Standard gitignore for Claude Code projects. Excludes .claude/.cache, any local schema snapshots, and OS/editor artifacts.',role:'Git ignore rules',badge:'new',badgeLabel:'new',parent:'root'},
];

const byId = {};
FILES.forEach(f => byId[f.id] = f);
const roots = FILES.filter(f => !f.parent || f.parent === 'root').filter(f => f.id !== 'root');
// Actually let's include root's children
const rootChildren = FILES.filter(f => f.parent === 'root');

function renderTree(items, container) {
  items.forEach(item => {
    const children = FILES.filter(f => f.parent === item.id);
    const div = document.createElement('div');
    const row = document.createElement('div');
    row.className = 'tree-item' + (item.type === 'folder' ? ' folder' : '');
    row.dataset.id = item.id;

    const chevron = document.createElement('i');
    if (item.type === 'folder') {
      chevron.className = 'ti ti-chevron-right';
      chevron.setAttribute('aria-hidden','true');
    } else {
      chevron.className = item.badge === 'star' ? 'ti ti-alert-triangle' : item.badge === 'core' ? 'ti ti-shield' : 'ti ti-file-text';
      chevron.setAttribute('aria-hidden','true');
    }
    row.appendChild(chevron);

    const name = document.createElement('span');
    name.textContent = item.name;
    row.appendChild(name);

    if (item.badge) {
      const b = document.createElement('span');
      b.className = 'badge badge-' + (item.badge === 'star' ? 'star' : item.badge === 'core' ? 'core' : 'new');
      b.textContent = item.badgeLabel;
      row.appendChild(b);
    }

    div.appendChild(row);

    if (children.length) {
      const sub = document.createElement('div');
      sub.className = 'children';
      renderTree(children, sub);
      div.appendChild(sub);

      row.addEventListener('click', e => {
        e.stopPropagation();
        const open = sub.classList.toggle('open');
        row.classList.toggle('open', open);
      });
      // Start folders open
      sub.classList.add('open');
      row.classList.add('open');
    } else {
      row.addEventListener('click', e => {
        e.stopPropagation();
        document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
        row.classList.add('active');
        showDetail(item);
      });
    }
    container.appendChild(div);
  });
}

function showDetail(item) {
  const d = document.getElementById('detail');
  const badgeMap = {star:'★ Adversarial Challenger',core:'Core — immutable',new:'New file'};
  d.innerHTML = `
    <div class="detail-path">${item.path}</div>
    <div class="detail-title">${item.name}</div>
    <div class="detail-role">${item.role || ''}</div>
    ${item.badge ? `<div class="chips"><span class="chip">${badgeMap[item.badge]||item.badgeLabel}</span></div>` : ''}
    <div class="detail-divider"></div>
    <div class="detail-label">What it does</div>
    <div class="detail-desc">${item.desc}</div>
    ${item.inputs?.length ? `<div class="detail-label">Inputs</div><div class="chips">${item.inputs.map(i=>`<span class="chip">${i}</span>`).join('')}</div>` : ''}
    ${item.outputs?.length ? `<div class="detail-label">Outputs</div><div class="chips">${item.outputs.map(i=>`<span class="chip">${i}</span>`).join('')}</div>` : ''}
    ${item.note ? `<div class="detail-desc" style="margin-top:.5rem;font-style:italic">${item.note}</div>` : ''}
  `;
}

renderTree(rootChildren, document.getElementById('tree'));
</script>
